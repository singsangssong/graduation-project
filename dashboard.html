<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agentic Middleware Dashboard</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #172033;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 8px 0 0;
        color: #5b6577;
      }

      button {
        min-height: 40px;
        border: 1px solid #bcc5d6;
        border-radius: 6px;
        background: #ffffff;
        color: #172033;
        font-weight: 650;
        padding: 0 14px;
        cursor: pointer;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .metric {
        background: #ffffff;
        border: 1px solid #dfe4ee;
        border-radius: 8px;
        padding: 16px;
      }

      .label {
        font-size: 13px;
        color: #667085;
      }

      .value {
        margin-top: 10px;
        font-size: 30px;
        font-weight: 750;
      }

      .wide {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      pre {
        min-height: 220px;
        overflow: auto;
        background: #111827;
        color: #d1d5db;
        border-radius: 8px;
        padding: 16px;
      }

      @media (max-width: 820px) {
        header {
          align-items: flex-start;
          flex-direction: column;
        }

        .grid,
        .wide {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Agentic Middleware Dashboard</h1>
          <p class="subtitle">QCFuse read fusion and ATCC commit arbitration metrics</p>
        </div>
        <button id="refresh">Refresh</button>
      </header>

      <section class="grid">
        <div class="metric">
          <div class="label">Read requests</div>
          <div class="value" id="readRequests">-</div>
        </div>
        <div class="metric">
          <div class="label">Saved DB reads</div>
          <div class="value" id="savedReads">-</div>
        </div>
        <div class="metric">
          <div class="label">Commit requests</div>
          <div class="value" id="commitRequests">-</div>
        </div>
        <div class="metric">
          <div class="label">Rollbacks</div>
          <div class="value" id="rollbacks">-</div>
        </div>
      </section>

      <section class="wide">
        <div class="metric">
          <div class="label">Last winner</div>
          <div class="value" id="winner">-</div>
        </div>
        <div class="metric">
          <div class="label">Total saved cost</div>
          <div class="value" id="savedCost">-</div>
        </div>
      </section>

      <pre id="raw">{}</pre>
    </main>

    <script>
      async function refresh() {
        const response = await fetch("http://localhost:8080/metrics");
        const data = await response.json();
        const metrics = data.metrics;

        document.getElementById("readRequests").textContent = metrics.read_requests;
        document.getElementById("savedReads").textContent = metrics.saved_db_reads;
        document.getElementById("commitRequests").textContent = metrics.commit_requests;
        document.getElementById("rollbacks").textContent = metrics.rolled_back_commits;
        document.getElementById("winner").textContent = metrics.last_winner_agent_id || "-";
        document.getElementById("savedCost").textContent = `$${metrics.total_saved_cost_usd.toFixed(2)}`;
        document.getElementById("raw").textContent = JSON.stringify(data, null, 2);
      }

      document.getElementById("refresh").addEventListener("click", refresh);
      refresh().catch((error) => {
        document.getElementById("raw").textContent = `metrics fetch failed: ${error}`;
      });
    </script>
  </body>
</html>
